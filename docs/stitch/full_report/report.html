<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>完整健康报告</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Font: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#007bff',
            surface: '#f8fafc',
            card: '#ffffff'
          },
          borderRadius: {
            'twelve': '12px',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', sans-serif;
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.35s;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .chart-bar {
      transition: height 0.5s ease-out;
    }
    /* Hide scrollbar for cleaner mobile look */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="antialiased text-slate-900">
<!-- BEGIN: MobileHeader -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-4 py-4" data-purpose="main-header">
<div class="flex items-center justify-between max-w-lg mx-auto">
<button aria-label="返回" class="p-1" style="">
<svg class="h-6 w-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-semibold text-slate-800" style="">完整健康报告</h1>
<button aria-label="设置" class="p-1" style="">
<svg class="h-6 w-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</header>
<!-- END: MobileHeader -->
<!-- BEGIN: ReportPeriodSelector -->
<div class="px-4 py-6 max-w-lg mx-auto" data-purpose="report-period">
<div class="bg-primary/5 border border-primary/10 rounded-twelve p-4 flex items-center justify-between">
<div>
<p class="text-xs text-primary font-medium uppercase tracking-wider" style="">当前查看</p>
<h2 class="text-lg font-bold text-slate-800" style="">10月1日健康报告</h2>
</div>
<button class="bg-white p-2 rounded-full shadow-sm text-primary" style="">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" fill-rule="evenodd"></path>
</svg>
</button>
</div>
</div>
<!-- END: ReportPeriodSelector -->
<main class="px-4 pb-24 max-w-lg mx-auto space-y-4">
<!-- BEGIN: ActivitySummary -->
<section class="bg-white p-5 rounded-twelve shadow-sm border border-slate-50" data-purpose="activity-summary">
<div class="flex items-center justify-between mb-4">
<h3 class="font-bold text-slate-800 flex items-center gap-2" style="">
<span class="w-2 h-5 bg-orange-400 rounded-full"></span>
          活动总结
        </h3>
<span class="text-xs font-medium text-slate-400" style="">昨日步数</span>
</div>
<div class="flex items-center justify-around gap-4">
<!-- Progress Ring Container -->
<div class="relative flex items-center justify-center w-24 h-24">
<svg class="w-full h-full">
<circle class="text-slate-100" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary progress-ring-circle" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="60" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="text-xl font-bold" style="">76%</span>
</div>
</div>
<!-- Stats Text -->
<div class="space-y-3">
<div>
<p class="text-xs text-slate-400" style="">总步数</p>
<p class="text-2xl font-bold text-slate-800 tracking-tight" style="">248,500 <span class="text-sm font-normal text-slate-500" style="">步</span></p>
</div>
<div>
<p class="text-xs text-slate-400" style="">热量消耗</p>
<p class="text-lg font-semibold text-slate-700" style="">8,016 <span class="text-sm font-normal text-slate-500" style="">kcal</span></p>
</div>
</div>
</div>
</section>
<!-- END: ActivitySummary -->
<!-- BEGIN: SleepAnalysis -->
<section class="bg-white p-5 rounded-twelve shadow-sm border border-slate-50" data-purpose="sleep-analysis">
<div class="flex items-center justify-between mb-4">
<h3 class="font-bold text-slate-800 flex items-center gap-2" style="">
<span class="w-2 h-5 bg-indigo-500 rounded-full"></span>
          睡眠分析
        </h3>
<span class="text-xs font-medium text-indigo-500 px-2 py-0.5 bg-indigo-50 rounded-full" style="">良好</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-slate-50 p-3 rounded-twelve">
<p class="text-xs text-slate-400 mb-1" style="">昨夜时长</p>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-slate-800" style="">7</span>
<span class="text-sm text-slate-500" style="">时</span>
<span class="text-xl font-bold text-slate-800" style="">12</span>
<span class="text-sm text-slate-500" style="">分</span>
</div>
</div>
<div class="bg-slate-50 p-3 rounded-twelve">
<p class="text-xs text-slate-400 mb-1" style="">质量评分</p>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-slate-800" style="">88</span>
<span class="text-sm text-slate-500" style="">/ 100</span>
</div>
</div>
</div>
</section>
<!-- END: SleepAnalysis -->
<!-- BEGIN: HeartRateTrend -->
<section class="bg-white p-5 rounded-twelve shadow-sm border border-slate-50" data-purpose="heart-rate">
<div class="flex items-center justify-between mb-4">
<h3 class="font-bold text-slate-800 flex items-center gap-2" style="">
<span class="w-2 h-5 bg-red-500 rounded-full"></span>
          心率趋势
        </h3>
<span class="text-xs text-slate-400" style="">静息平均: 62 bpm</span>
</div>
<!-- Mini Chart Placeholder -->
<div class="h-24 w-full flex items-end justify-between gap-1 mt-2">
<div class="bg-red-100 w-full h-1/2 rounded-t-sm chart-bar"></div>
<div class="bg-red-200 w-full h-3/4 rounded-t-sm chart-bar"></div>
<div class="bg-red-400 w-full h-2/3 rounded-t-sm chart-bar"></div>
<div class="bg-red-300 w-full h-4/5 rounded-t-sm chart-bar"></div>
<div class="bg-red-500 w-full h-full rounded-t-sm chart-bar"></div>
<div class="bg-red-300 w-full h-3/4 rounded-t-sm chart-bar"></div>
<div class="bg-red-400 w-full h-1/2 rounded-t-sm chart-bar"></div>
</div>
</section>
<!-- END: HeartRateTrend -->
<!-- BEGIN: SpO2AndStress -->
<div class="grid grid-cols-2 gap-4">
<section class="bg-white p-4 rounded-twelve shadow-sm border border-slate-50" data-purpose="spo2">
<h3 class="text-sm font-bold text-slate-800 mb-2" style="">血氧饱和度</h3>
<p class="text-2xl font-bold text-primary" style="">98<span class="text-sm font-normal text-slate-400" style="">%</span></p>
<p class="text-[10px] text-green-500 mt-1" style="">状态：极佳</p>
</section>
<section class="bg-white p-4 rounded-twelve shadow-sm border border-slate-50" data-purpose="stress">
<h3 class="text-sm font-bold text-slate-800 mb-2" style="">平均压力值</h3>
<p class="text-2xl font-bold text-slate-700" style="">32</p>
<p class="text-[10px] text-blue-500 mt-1" style="">状态：轻松</p>
</section>
</div>
<!-- END: SpO2AndStress -->
<!-- BEGIN: HealthInsights -->
<section class="bg-primary/10 p-5 rounded-twelve border border-primary/20" data-purpose="health-insights">
<div class="flex items-center gap-2 mb-3">
<div class="p-1.5 bg-primary rounded-lg">
<svg class="h-4 w-4 text-white" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.477.859h4z"></path>
</svg>
</div>
<h3 class="font-bold text-primary" style="">AI健康洞察</h3>
</div>
<div class="space-y-3">
<p class="text-sm text-slate-700 leading-relaxed" style="">
          您的平均静息心率保持在理想范围内。建议您在本月增加两次高强度间歇训练（HIIT）以进一步提升心肺功能。
        </p>
<p class="text-sm text-slate-700 leading-relaxed" style="">
          最近一周睡眠规律性有所下降，建议每晚23:00前入睡以改善恢复质量。
        </p>
</div>
</section>
<!-- END: HealthInsights -->
</main>
<!-- BEGIN: BottomActions -->
<div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-100 p-4" data-purpose="bottom-navigation">
<div class="flex gap-3 max-w-lg mx-auto">
<button class="flex-1 bg-primary text-white font-semibold py-3 px-6 rounded-twelve shadow-lg shadow-primary/20 active:scale-95 transition-transform" style="">
        下载报告 PDF
      </button>
<button aria-label="分享报告" class="bg-slate-100 text-slate-600 p-3 rounded-twelve active:scale-95 transition-transform" style="">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
<!-- END: BottomActions -->
</body></html>
